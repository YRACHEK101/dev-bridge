name: Release

# Publishes to npm when a version tag (e.g. v0.1.0) is pushed.
# Requires an NPM_TOKEN secret (an npm automation token) in the repo settings.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Guard: the tag (v1.2.3) must match the version in package.json (1.2.3).
      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Note: --provenance requires a PUBLIC repo. Re-add it once this repo is
      # public to get the npm provenance/supply-chain attestation.
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
